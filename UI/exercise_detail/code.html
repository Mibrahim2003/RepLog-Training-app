</div>
</div>

</div>

<div class="font-data-lg text-data-lg">4,200 LBS</div>
</div>
<div class="bg-surface-container-lowest border-4 border-on-secondary-fixed p-md neo-brutalism-shadow">

</div>

</div>

<circle cx="80" cy="40" fill="#000000" r="2" vector-effect="non-scaling-stroke"></circle>

</div>
