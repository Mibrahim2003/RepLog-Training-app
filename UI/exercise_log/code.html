<button class="text-[#FF5F5F] hover:bg-zinc-100 dark:hover:bg-zinc-800 active:translate-x-1 active:translate-y-1 transition-all p-2 no-radius">

</button>
<span class="text-2xl font-black italic tracking-tighter text-black dark:text-white">REPLOG</span>
<button class="text-black dark:text-white hover:bg-zinc-100 dark:hover:bg-zinc-800 active:translate-x-1 active:translate-y-1 transition-all p-2 no-radius">

</button>

<div class="border-[2px] border-black px-xs py-[2px] font-data-sm text-data-sm uppercase bg-white">

            </div>
</div>
<!-- Exercise Block 1 -->
<article class="bg-white border-[3px] border-black brutal-shadow flex flex-col no-radius">

<button class="text-black hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
<!-- Sets Table -->
<div class="flex flex-col w-full">
<!-- Table Header -->
<div class="grid grid-cols-[3fr_3fr_3fr_1fr] gap-0 border-b-[1px] border-black bg-surface-container-low font-data-sm text-data-sm p-sm">

<div class="text-center text-on-surface-variant">LBS</div>
<div class="text-center text-on-surface-variant">REPS</div>
<div class="text-center"></div>
</div>
<!-- Set Row 1 -->

<div class="text-center font-data-lg text-data-lg">1</div>
<div class="px-xs">
<input class="w-full border-[3px] border-black font-data-lg text-data-lg text-center p-xs brutal-shadow focus:outline-none focus:bg-inverse-on-surface transition-colors no-radius" type="number" value="135"/>
</div>
<div class="px-xs">
<input class="w-full border-[3px] border-black font-data-lg text-data-lg text-center p-xs brutal-shadow focus:outline-none focus:bg-inverse-on-surface transition-colors no-radius" type="number" value="10"/>
</div>
<div class="flex justify-center">
<button class="text-secondary hover:text-black transition-colors p-xs border-2 border-transparent hover:border-black active:translate-x-1 active:translate-y-1 no-radius">

</button>
</div>
</div>

<div class="px-xs">

</div>
<div class="flex justify-center">
<button class="text-secondary hover:text-black transition-colors p-xs border-2 border-transparent hover:border-black active:translate-x-1 active:translate-y-1 no-radius">

</button>
</div>
</div>

<div class="px-xs">

<div class="flex justify-center">
<button class="text-black hover:text-primary transition-colors p-xs border-[2px] border-black brutal-shadow brutal-shadow-hover brutal-shadow-active bg-white no-radius" title="Duplicate Previous Set">
